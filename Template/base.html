<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Sharing - Advanced Navigation Bar</title>
    <!-- Bootstrap 4 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
        }

        /* Navbar Styling — override Bootstrap navbar defaults */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: #34495E !important;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 0;
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin-right: 20px;
        }

        .nav-links a {
            text-decoration: none !important;
            color: white !important;
            font-size: 16px;
            font-weight: 500;
            position: relative;
            transition: color 0.3s;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 100%;
            height: 2px;
            background-color: #1ABC9C;
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .nav-links a:hover::after {
            transform: scaleX(1);
        }

        .nav-links a:hover {
            color: #1ABC9C !important;
        }

        .auth-buttons {
            display: flex;
            align-items: center;
        }

        .wallet-container a {
            display: flex;
            align-items: center;
            color: white !important;
            text-decoration: none !important;
            font-size: 14px;
            font-weight: bold;
            margin-right: 15px;
            background-color: transparent !important;
            border: none;
            padding: 0;
        }

        .wallet-container i {
            font-size: 24px;
            color: red;
            margin-right: 8px; /* Spacing between icon and text */
        }

        .auth-buttons a {
            text-decoration: none !important;
            color: white !important;
            background-color: #1ABC9C;
            padding: 8px 15px;
            border-radius: 20px;
            margin-left: 10px;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
        }

        .auth-buttons a:hover {
            background-color: #16A085;
            color: white !important;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .nav-links {
                flex-direction: column;
                align-items: flex-start;
                background-color: #34495E;
                position: absolute;
                top: 60px;
                left: 0;
                width: 100%;
                display: none;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links li {
                margin: 15px 0;
            }

            .navbar .menu-toggle {
                display: block;
                cursor: pointer;
                font-size: 24px;
            }
        }

        /* Menu Toggle for Mobile */
        .menu-toggle {
            display: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="menu-toggle">&#9776;</div>
        <ul class="nav-links">
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'availablecycles' %}">Available Cycles</a></li>
            <li><a href="{% url 'help' %}">Help</a></li>
            <li><a href="{% url 'aboutus' %}">About Us</a></li>
            <li><a href="{% url 'contactus' %}">Contact Us</a></li>
        </ul>

        <div class="auth-buttons">
            {% if user.is_authenticated %}
                <a href="{% url 'my_bookings' %}" style="background-color:#2575fc !important;">
                    <i class="fas fa-list-alt" style="margin-right:5px;"></i>My Bookings
                </a>
                <a href="{% url 'my_cycles' %}" style="background-color:#1ABC9C !important;">
                    <i class="fas fa-bicycle" style="margin-right:5px;"></i>My Cycles
                </a>
                <div class="wallet-container">
                    <a href="{% url 'wallet' %}">
                        <i class="fas fa-wallet"></i>
                        <span>₹{% if user_profile %}{{ user_profile.wallet_balance|floatformat:0 }}{% else %}0{% endif %}</span>
                    </a>
                </div>
                <a href="{% url 'signout' %}">
                    <i class="fas fa-sign-out-alt" style="margin-right:5px;"></i>Logout
                </a>
            {% else %}
                <a href="{% url 'signin' %}">Sign In</a>
                <a href="{% url 'signup' %}">Sign Up</a>
            {% endif %}
        </div>
    </nav>
{% block body %} 

{% endblock  %}
    <!-- Bootstrap 4 JS (jQuery + Popper required) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
    <script>
        // JavaScript for Menu Toggle
        const menuToggle = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
