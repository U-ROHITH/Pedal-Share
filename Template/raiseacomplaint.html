{% extends "base.html" %}

{% block body %}
<style>
  .complaint-page {
    font-family: 'Poppins', sans-serif;
    background: #f3f3f5;
    min-height: calc(100vh - 70px);
    padding: 48px 20px;
  }

  .complaint-wrap {
    max-width: 600px;
    margin: 0 auto;
  }

  .complaint-wrap h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: #34495E;
    margin-bottom: 4px;
  }

  .complaint-wrap .subtitle {
    font-size: 0.88rem;
    color: #95a5a6;
    margin-bottom: 24px;
  }

  .msg-banner {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 0.88rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .msg-success { background:#eafaf1; border-left:4px solid #1ABC9C; color:#1e8449; }
  .msg-error   { background:#fef0f0; border-left:4px solid #e74c3c; color:#c0392b; }

  .form-card {
    background: #fff;
    border-radius: 16px;
    padding: 36px 36px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .field-group {
    margin-bottom: 18px;
  }

  .field-group label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: #34495E;
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }

  .field-group input,
  .field-group select,
  .field-group textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 9px;
    font-size: 0.88rem;
    font-family: 'Poppins', sans-serif;
    background: #fafafa;
    box-sizing: border-box;
    color: #34495E;
    transition: border-color 0.2s;
  }

  .field-group input:focus,
  .field-group select:focus,
  .field-group textarea:focus {
    outline: none;
    border-color: #2575fc;
    box-shadow: 0 0 0 3px rgba(37,117,252,0.1);
    background: #fff;
  }

  .field-group textarea { resize: vertical; min-height: 100px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 6px;
  }

  .submit-btn {
    flex: 1;
    padding: 13px;
    background: linear-gradient(135deg, #2575fc, #34495E);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.97rem;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .submit-btn:hover { opacity: 0.88; }

  .reset-btn {
    padding: 13px 22px;
    background: #fff;
    color: #e74c3c;
    border: 1.5px solid #e74c3c;
    border-radius: 10px;
    font-size: 0.97rem;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }

  .reset-btn:hover { background: #fef0f0; }

  @media (max-width: 600px) {
    .complaint-page { padding: 24px 14px; }
    .form-card { padding: 24px 18px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>

<div class="complaint-page">
  <div class="complaint-wrap">
    <h1><i class="fas fa-exclamation-circle" style="color:#e74c3c;margin-right:10px;"></i>Raise a Complaint</h1>
    <p class="subtitle">Experiencing an issue? Let us know and we'll resolve it within 48 hours.</p>

    {% if messages %}
      {% for message in messages %}
        <div class="msg-banner {% if message.tags == 'error' %}msg-error{% else %}msg-success{% endif %}">
          <i class="fas fa-{% if message.tags == 'error' %}exclamation-circle{% else %}check-circle{% endif %}"></i>
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <div class="form-card">
      <form method="POST" action="{% url 'raiseacomplaint' %}">
        {% csrf_token %}

        <div class="form-row">
          <div class="field-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" placeholder="Full name" required>
          </div>
          <div class="field-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
          </div>
        </div>

        <div class="field-group">
          <label for="category">Complaint Category</label>
          <select id="category" name="category" required>
            <option value="">Select a category…</option>
            <option value="booking">Booking Problem</option>
            <option value="cycle_condition">Cycle Condition</option>
            <option value="wallet">Wallet / Refund Issue</option>
            <option value="owner">Owner Behaviour</option>
            <option value="app">App / Technical Issue</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="field-group">
          <label for="booking_ref">Booking Reference <span style="font-weight:400;color:#bdc3c7;">(optional)</span></label>
          <input type="text" id="booking_ref" name="booking_ref" placeholder="e.g. #42">
        </div>

        <div class="field-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" placeholder="Please describe your complaint in detail…" required></textarea>
        </div>

        <div class="field-group">
          <label for="date">Date of Incident</label>
          <input type="date" id="date" name="date" required>
        </div>

        <div class="btn-row">
          <button type="reset" class="reset-btn">
            <i class="fas fa-undo" style="margin-right:5px;"></i>Reset
          </button>
          <button type="submit" class="submit-btn">
            <i class="fas fa-paper-plane" style="margin-right:8px;"></i>Submit Complaint
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock body %}
