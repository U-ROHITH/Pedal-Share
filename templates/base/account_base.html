{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-title">My Account</div>
            <nav class="sidebar-nav">
                <div class="sidebar-item">
                    <a href="{% url 'payments:wallet' %}" class="sidebar-link {% if request.resolver_match.url_name == 'wallet' %}active{% endif %}">
                        <i class="fas fa-wallet"></i> Wallet
                    </a>
                </div>
                <div class="sidebar-item">
                    <a href="{% url 'bookings:my_bookings' %}" class="sidebar-link {% if request.resolver_match.url_name == 'my_bookings' %}active{% endif %}">
                        <i class="fas fa-calendar-check"></i> My Bookings
                    </a>
                </div>
                <div class="sidebar-item">
                    <a href="{% url 'cycles:available' %}" class="sidebar-link">
                        <i class="fas fa-bicycle"></i> Book a Cycle
                    </a>
                </div>
                <div class="sidebar-item">
                    <a href="{% url 'cycles:my_cycles' %}" class="sidebar-link {% if request.resolver_match.url_name == 'my_cycles' %}active{% endif %}">
                        <i class="fas fa-motorcycle"></i> My Cycles
                    </a>
                </div>
                <div class="sidebar-item mt-4 border-top pt-3">
                    <a href="{% url 'users:signout' %}" class="sidebar-link text-danger">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-content">
            {% block dashboard_content %}{% endblock %}
        </main>
    </div>
</div>

<style>
    .dashboard-container {
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 30px;
    }

    .sidebar {
        background: white;
        border-radius: 16px;
        padding: 24px 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        height: fit-content;
        position: sticky;
        top: 30px;
    }

    .sidebar-title {
        color: #94a3b8;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        padding: 0 16px 16px;
        border-bottom: 1px solid #f1f5f9;
        margin-bottom: 16px;
    }

    .sidebar-nav {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .sidebar-link {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        color: #475569;
        text-decoration: none !important;
        border-radius: 12px;
        font-weight: 500;
        transition: all 0.2s ease;
    }

    .sidebar-link i {
        width: 24px;
        font-size: 18px;
        margin-right: 12px;
        color: #64748b;
        transition: all 0.2s ease;
    }

    .sidebar-link:hover {
        background-color: #f8fafc;
        color: #2575fc;
    }

    .sidebar-link:hover i {
        color: #2575fc;
    }

    .sidebar-link.active {
        background-color: #2575fc;
        color: white;
        box-shadow: 0 4px 12px rgba(37, 117, 252, 0.2);
    }

    .sidebar-link.active i {
        color: white;
    }

    @media (max-width: 992px) {
        .dashboard-container {
            grid-template-columns: 1fr;
        }
        .sidebar {
            position: static;
            margin-bottom: 30px;
        }
    }
</style>
{% endblock %}
