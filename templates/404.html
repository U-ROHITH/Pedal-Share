<!-- 404 Error Page -->
{% extends "base.html" %}
{% load static %}

{% block title %}Page Not Found - Pedal Share{% endblock %}

{% block content %}
<div class="container">
    <div style="text-align: center; padding: 100px 20px;">
        <h1 style="font-size: 5rem; color: var(--primary); margin-bottom: 20px;">404</h1>
        <h2 style="margin-bottom: 20px;">Page Not Found</h2>
        <p style="font-size: 1.1rem; color: var(--gray-600); margin-bottom: 40px;">
            Sorry, the page you're looking for doesn't exist or has been moved.
        </p>
        <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
            <a href="{% url 'home' %}" class="btn btn-primary">
                <i class="fas fa-home"></i> Go Home
            </a>
            <a href="{% url 'cycles:available' %}" class="btn btn-secondary">
                <i class="fas fa-bicycle"></i> Browse Cycles
            </a>
        </div>
    </div>
</div>
{% endblock %}
